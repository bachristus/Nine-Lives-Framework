name: Core Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  core-tests:
    name: Core (plain .NET) Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore plain .Net solution for Core
        run: dotnet restore DotNet/NineLives.Framework.DotNet.Core/NineLives.Framework.DotNet.Core.slnx

      - name: Build plain .Net solution for Core
        run: dotnet build DotNet/NineLives.Framework.DotNet.Core/NineLives.Framework.DotNet.Core.slnx --no-restore

      - name: Test plain .Net solution for Core
        run: dotnet test DotNet/NineLives.Framework.DotNet.Core/NineLives.Framework.DotNet.Core.slnx --no-build --verbosity normal
