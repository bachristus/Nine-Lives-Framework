name: Core Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  core-tests:
    name: Core (plain .NET) tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore plain .Net solution
        run: dotnet restore PlainDotNet/PlainDotNet.slnx

      - name: Build plain .Net solution
        run: dotnet build PlainDotNet/PlainDotNet.slnx --no-restore

      - name: Test plain .Net solution
        run: dotnet test PlainDotNet/PlainDotNet.slnx --no-build --verbosity normal
